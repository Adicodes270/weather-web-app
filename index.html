<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App</title>
    <meta name="description" content="Weather WebApp Created By Adicodes270">
    <link rel="icon" type="image/x-icon" href="">

    <link rel="preconnect" href="https://weather-web-app.adityaalt9090.workers.dev">
    <link rel="dns-prefetch" href="https://weather-web-app.adityaalt9090.workers.dev">
    <link rel="preconnect" href="https://cdn.meteocons.com">
    <link rel="dns-prefetch" href="https://cdn.meteocons.com">

    

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="container">
        <div class="weather-card">




            <div class="weather-main">

                <div class="weather-detailed">
                    <h1 id="time">07:45 AM</h1>
                    <h2 id="date">Wednesday, 14 April 2026</h2>
                    <h2 id="greeting">Good Morning</h2>
                </div>


                <div class="weather-info">
                    <div class="search-box">
                        <i class="fa-solid fa-location-dot"></i>
                        <input type="text" placeholder="Enter your city..." id="city-input" value="Delhi">
                        <button id="search-btn" aria-label="Search"><i
                                class="fa-solid fa-magnifying-glass"></i></button>
                    </div>

                    <div class="weather-display hidden">

                        <div class="weather-display-card">
                            <img id="weather-icon" src="" alt="loading">
                            <i id="error-icon" class="fa-solid fa-triangle-exclamation"
                                style="display:none; font-size: 8rem; color: #e74c3c;"></i>
                            <h1 id="weather-desc">Loading</h1>
                            <h1 id="weather-temp">--°C</h1>

                            <div class="minor-details">
                                <div class="stat">
                                    <span class="stat-label">Wind</span>
                                    <span class="stat-value" id="wind-speed">Loading</span>
                                </div>
                                <div class="stat">
                                    <span class="stat-label">Humidity</span>
                                    <span class="stat-value" id="humidity">Loading</span>
                                </div>
                                <div class="stat">
                                    <span class="stat-label">Feels Like</span>
                                    <span class="stat-value" id="feels-like">Loading</span>
                                </div>
                            </div>

                        </div>

                    </div>
                </div>




            </div>
        </div>



    </main>
    <script src="script.js"></script>
</body>

</html>
