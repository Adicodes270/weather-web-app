<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App</title>
    <meta name="description" content="Weather WebApp Created By Adicodes270">
    <link rel="icon" type="image/x-icon" href="">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme.css">
</head>

<body>

    <main class="container">
        <div class="weather-card">




            <div class="weather-main">

                <div class="weather-detailed">

                </div>


                <div class="weather-info">
                    <div class="search-box">
                        <i class="fa-solid fa-location-dot"></i>
                        <input type="text" placeholder="Enter your city..." id="city-input" value="Delhi">
                        <button id="search-btn" aria-label="Search"><i
                                class="fa-solid fa-magnifying-glass"></i></button>
                    </div>

                    <div class="weather-display hidden">

                        <div class="weather-display-card">
                            <img id="weather-icon" src="" alt="icon">
                            <h1 id="weather-desc">--</h1>
                            <h1 id="weather-temp">--°C</h1>

                            <div class="minor-details">
                                <h2 id="wind-speed"> Km/Hr</h2>
                                <h2 id="humidity"> %</h2>
                                <h2 id="feels-like">--°C</h2>
                            </div>

                        </div>

                    </div>
                </div>




            </div>
        </div>



    </main>
    <script src="script.js"></script>
</body>

</html>
